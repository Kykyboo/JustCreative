<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just Creative</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #829179;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            margin: 0;
        }

        .logo {
            width: 100px;
            margin-bottom: 30px;
        }

        h1 {
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: clamp(2.5rem, 8vw, 6rem);
            font-weight: 900;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <!-- Logo toegevoegd -->
    <img src="https://i.imgur.com/Mc8CFpW.png" alt="Logo" class="logo">

    <h1>Website Opening</h1>
    
    <!-- Timer zonder italic/slanted stijl -->
    <div class="glass" id="timer">00:00:00:00</div>

    <script>
        // Target: 20 mei 2026 om 15:00
        const target = new Date("May 20, 2026 15:00:00").getTime();

        setInterval(() => {
            const now = new Date().getTime();
            const diff = target - now;
            
            if (diff <= 0) {
                document.getElementById("timer").innerText = "00:00:00:00";
                return;
            }

            const d = Math.floor(diff / 86400000).toString().padStart(2, '0');
            const h = Math.floor((diff % 86400000) / 3600000).toString().padStart(2, '0');
            const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
            const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');

            document.getElementById("timer").innerText = `${d}:${h}:${m}:${s}`;
        }, 1000);
    </script>
</body>
</html>
